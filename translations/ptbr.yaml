about:
  title: ¿What is Pilas Engine?
  text: |-
    Pilas é uma ferramentas para fazer jogos de uma maneira simples e divertida.

    Nós fizemos essa ferramenta para que jovens possam descobrir e aprender a programar
    computadores. Nós acreditamos que aprender a programar video-games é algo tão
    espectacular que todas as pessoas deveriam ter a habilidade de fazê-lo. Aprender a programar te permite
    tomar o controle de computadores para inventar, compartilhar e desenvolver qualquer tipo de programa.

    Os ícones da interface foram criados por Icons8, enquanto os gráficos de jogo
    foram criados por Walter Velazquez e kenney project.

  end: |-
    Visite o site do PilasEngine para aprender mais sobre esse projeto ou envie uma mensagem
    diretamente em nosso fórum de mensagens de você tiver alguma dúvida ou sugestão.

  forum.link: Fórum de mensagens
  web.link: Site do PilasEngine


